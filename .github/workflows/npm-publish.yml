name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before publishing
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        if: github.event_name == 'workflow_dispatch' && inputs.version_bump != 'none'
        run: npm version ${{ inputs.version_bump }} --no-git-tag-version

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch' && inputs.version_bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump package version for npm publish"
          git push

      - name: Publish
        run: npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
